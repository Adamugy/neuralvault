steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install'

  # 2. Generate Prisma Client
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'prisma:generate']
    id: 'prisma'
    waitFor: ['install']

  # 3. Push Schema to Cloud SQL
  - name: 'node:20'
    entrypoint: 'sh'
    args: 
      - '-c'
      - 'DATABASE_URL=${_DATABASE_URL} npx prisma db push'
    id: 'push'
    waitFor: ['prisma']

substitutions:
  _DATABASE_URL: ''
