steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install'

  # 2. Run Linting
  # - name: 'node:20'
  #   entrypoint: 'npm'
  #   args: ['run', 'lint']
  #   id: 'lint'
  #   waitFor: ['install']

  # 3. Run Tests
  # - name: 'node:20'
  #   entrypoint: 'npm'
  #   args: ['run', 'test']
  #   id: 'test'
  #   waitFor: ['install']

  # 4. Generate Prisma Client
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'prisma:generate']
    id: 'prisma'
    waitFor: ['install']

  # 4.1 Run Database Migrations
  # - name: 'node:20'
  #   entrypoint: 'npm'
  #   args: ['run', 'prisma:deploy']
  #   id: 'migrate'
  #   waitFor: ['prisma']

  # 5. Build and Push Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest',
      '.'
    ]
    id: 'build-image'
    waitFor: ['prisma']

  # 6. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest']
    id: 'push-image'
    waitFor: ['build-image']

  # 7. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', '${_SERVICE_NAME}',
      '--image', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest',
      '--region', '${_LOCATION}',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]
    id: 'deploy'
    waitFor: ['push-image']

images:
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest'

substitutions:
  _LOCATION: 'europe-west1'
  _REPOSITORY: 'neuralvault-repo'
  _SERVICE_NAME: 'neuralvault'
